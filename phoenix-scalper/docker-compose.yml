services:
  phoenix-scalper:
    build: .
    container_name: phoenix-scalper-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8082:8082"
    volumes:
      - ./config.json:/freqtrade/config.json:ro
      - scalper_data:/freqtrade/user_data
    command: >
      trade
      --config /freqtrade/config.json
      --strategy PhoenixScalper
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --logfile /freqtrade/user_data/logs/freqtrade.log

volumes:
  scalper_data:
