services:
  phoenix-scalper-v5-btc:
    build: .
    container_name: phoenix-scalper-v5-btc-bot
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - AIODNS_RESOLVE_USE_SOCKET=1
    env_file: .env
    ports:
      - "127.0.0.1:8085:8085"
    volumes:
      - ./config-v5-btc.json:/freqtrade/config.json:ro
      - ./user_data:/freqtrade/user_data
      - ./strategies:/freqtrade/strategies
    command: >
      trade
      --config /freqtrade/config.json
      --strategy PhoenixScalperV5_BTC
      --strategy-path /freqtrade/strategies/
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --logfile /freqtrade/user_data/logs/freqtrade.log

volumes:
  scalper_v5_btc_data:
