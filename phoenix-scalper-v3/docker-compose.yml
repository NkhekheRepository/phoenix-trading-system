services:
  phoenix-scalper-v3:
    build:
      context: ../phoenix-scalper
      dockerfile: Dockerfile
    container_name: phoenix-scalper-v3-bot
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - AIODNS_RESOLVE_USE_SOCKET=1
    env_file: .env
    ports:
      - "127.0.0.1:8083:8083"
    volumes:
      - ./config.json:/freqtrade/config.json:ro
      - scalper_v3_data:/freqtrade/user_data
    command: >
      trade
      --config /freqtrade/config.json
      --strategy PhoenixScalperV3
      --strategy-path /freqtrade/strategies/
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --logfile /freqtrade/user_data/logs/freqtrade.log

volumes:
  scalper_v3_data:
